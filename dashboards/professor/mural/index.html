<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassControl | Mural de Avisos</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="/shared/css/global.css"> 
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

    <aside class="sidebar">
        <button id="menu-toggle" class="menu-toggle-btn">
            <i class="fas fa-bars"></i>
        </button>
         
        <div class="sidebar-header mb-5">
            <img src="/assets/imagens/Logo.png" alt="Logo ClassControl" width="150">
        </div>
        <nav>
            <a href="../index.html" class="nav-link-custom"><i class="fas fa-chart-pie"></i> Dashboard</a>            
            <a href="../diario/index.html" class="nav-link-custom"><i class="fas fa-clipboard-list"></i> Diário de Classe</a>
            <a href="../plano-aula/index.html" class="nav-link-custom"><i class="fas fa-book-open"></i> Planos de Aula</a>
            <a href="../atividades/index.html" class="nav-link-custom"><i class="fas fa-calendar-alt"></i> Avaliações e Calendário</a>
            <a href="index.html" class="nav-link-custom active"><i class="fas fa-bullhorn"></i> Mural de Avisos</a>
            <a href="../mensagens/index.html" class="nav-link-custom"><i class="fas fa-comments"></i> Mensagens</a>
            <a href="../configuracoes/index.html" class="nav-link-custom"><i class="fas fa-cog"></i> Configurações</a>
            
            <div class="logout-section mt-auto">
                <a href="#" id="btn-logout" class="nav-link-custom text-danger">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </a>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        
        <header class="mb-4">
            <div class="user-card-mini d-flex justify-content-between align-items-center w-100">
                <div class="d-flex align-items-center gap-3">
                    <div class="user-profile">
                        <img src="https://ui-avatars.com/api/?name=Prof+Ricardo&background=004A8D&color=fff" class="rounded-pill shadow-sm" width="45">
                    </div>
                    <div>
                        <h6 class="fw-800 mb-0">Prof. Ricardo Oliveira</h6>
                        <span class="text-muted tiny">Especialista em Desenvolvimento de Sistemas</span>
                    </div>
                </div>

                <div class="d-flex flex-column align-items-end">
                    <label class="tiny text-muted fw-bold mb-1">TURMA EM FOCO:</label>
                    <select id="seletor-turma" class="form-select border-0 shadow-sm" style="border-radius: 10px; min-width: 260px; cursor: pointer; background-color: #f8fafc;">
                        <option value="Técnico em TI - Noite (Turma A)" selected>Técnico em TI - Noite (Turma A)</option>
                        <option value="Desenvolvimento Web - Manhã">Desenvolvimento Web - Manhã</option>
                        <option value="Lógica de Programação - Tarde">Lógica de Programação - Tarde</option>
                    </select>
                </div>
            </div>
        </header>

        <div class="card border-0 shadow-sm p-4 mb-4" style="border-radius: 16px;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h5 class="fw-800 text-dark mb-0">Mural de Avisos da Turma</h5>
                    <span class="tiny text-muted">Comunicações e recados fixados para os alunos</span>
                </div>
                <button class="btn btn-primary fw-bold px-3 py-2" style="border-radius: 8px;" data-bs-toggle="modal" data-bs-target="#modalNovoAviso">
                    <i class="fas fa-plus me-1"></i> Criar Comunicado
                </button>
            </div>

            <div class="row g-3" id="container-mural-avisos">
                </div>
        </div>
    </main>

    <div class="modal fade" id="modalNovoAviso" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0" style="border-radius: 15px;">
                <div class="modal-header border-0 pt-4 px-4">
                    <h5 class="modal-title fw-800 text-primary">Criar Novo Aviso</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body px-4">
                    <form id="form-novo-aviso">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-secondary">Título do Comunicado</label>
                            <input type="text" class="form-control" placeholder="Ex: Mudança de sala no laboratório" style="border-radius: 8px;" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-secondary">Categoria / Prioridade</label>
                            <select class="form-select" style="border-radius: 8px;">
                                <option value="urgente">🚨 Importante / Urgente</option>
                                <option value="geral" selected>📢 Comunicado Geral</option>
                                <option value="evento">📅 Evento / Workshop</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-secondary">Mensagem</label>
                            <textarea class="form-control" rows="4" placeholder="Digite o conteúdo detalhado do aviso para os alunos..." style="border-radius: 8px;" required></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0 pb-4 px-4">
                    <button type="button" class="btn btn-light fw-bold" data-bs-dismiss="modal" style="border-radius: 8px;">Cancelar</button>
                    <button type="submit" form="form-novo-aviso" class="btn btn-primary fw-bold" style="border-radius: 8px;">Publicar no Mural</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/shared/js/main.js"></script>
    <script src="script.js"></script>
</body>
</html>
