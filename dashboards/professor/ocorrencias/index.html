<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Ocorrência</title>
</head>
<body>

  <h2>Registrar Ocorrência</h2>

  <form id="formOcorrencia">

    <label>Nome da Ocorrência</label><br>
    <input type="text" id="nome" required><br><br>

    <label>Descrição</label><br>
    <textarea id="descricao" required></textarea><br><br>

    <label>Aluno</label><br>
    <select id="aluno"></select><br><br>

    <label>Professor</label><br>
    <p id="professorNome"></p>
    <br><br>
    <button type="submit">Registrar</button>

  </form>
  <a href="../index.html">Retornar ao Dashboard</a>

  <!-- script -->
  <script src="script.js"></script>

</body>
</html>
