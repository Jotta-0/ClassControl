<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../../shared/css/global.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <img id="logo" src="../../assets/imagens/Logo.png" alt="Logo">
        <h1>Cadastro</h1>
        <p class="subtitulo">Preencha os campos abaixo para criar sua conta</p>
        <form id="cadastroForm">
            <label for="name">Nome</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>

            <label for="cpf">CPF</label>
            <input type="text" id="cpf" name="cpf" required>

            <label for="password">Senha</label>
            <input type="password" id="password" name="password" required>

            <label for="tipo">Tipo de Usuário</label>
            <select id="tipo" name="tipo" required>
                <option value="ADM">Administrador</option>
                <option value="ALUNO">Aluno</option>
                <option value="PROFESSOR">Professor</option>
                <option value="RESPONSAVEL">Responsável</option>
            </select>
<br>
            <div class="opcoes">
                <a href="../admin/index.html">Retornar ao Dashboard</a>
            </div>

            <button type="submit" id="btnSubmit" class="btn primary">Cadastrar</button>
             
        </form>
    </div>
    <!-- 1º: Carrega a biblioteca global do Supabase (Sempre primeiro!) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- 2º: Seus scripts utilitários e de inicialização -->
    <script src="../../shared/js/main.js"></script>
    
    <!-- 3º: Seus scripts de regras de negócio e autenticação -->
    <script type="module" src="auth/auth.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
