<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassControl | Gestão de Usuários</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="/shared/css/global.css">
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header mb-5">
            <img src="/assets/imagens/Logo.png" alt="Logo ClassControl" width="150">
        </div>
        <nav>
            <a href="../index.html" class="nav-link-custom"><i class="fas fa-home"></i> Início</a>
            <a href="#" class="nav-link-custom active"><i class="fas fa-users"></i> Usuários</a>
            <a href="../turmas/index.html" class="nav-link-custom"><i class="fas fa-chalkboard-teacher"></i> Turmas</a>
            <a href="../disciplinas/index.html" class="nav-link-custom"><i class="fas fa-book"></i> Disciplinas</a>
            <a href="../comunicados/index.html" class="nav-link-custom"><i class="fas fa-bullhorn"></i> Comunicados</a>
            <a href="../relatorios/index.html" class="nav-link-custom"><i class="fas fa-chart-pie"></i> Relatórios</a>
            <a href="../configuracoes/index.html" class="nav-link-custom"><i class="fas fa-cog"></i> Configurações</a>
        </nav>
    </aside>

    <main class="main-content">
        
        <header class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h3 class="fw-800 text-dark mb-1">Controle de Usuários</h3>
                <p class="text-muted small mb-0">Gerencie, filtre e adicione contas de acesso ao ecossistema escolar.</p>
            </div>
            <div class="perfil-info d-flex align-items-center gap-3">
                <div class="text-end">
                    <span class="d-block fw-bold text-dark small">Administrador</span>
                    <span class="text-muted tiny">Gestão Geral</span>
                </div>
                <div class="avatar-falso">A</div>
            </div>
        </header>

        <div class="stat-card mb-4">
            <div class="row g-3 align-items-center">
                <div class="col-12 col-md-5">
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-search"></i></span>
                        <input type="text" id="input-busca" class="form-control bg-light border-start-0" placeholder="Buscar por nome, e-mail ou CPF...">
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <select id="filtro-cargo" class="form-select bg-light">
                        <option value="Todos">Todos os Cargos</option>
                        <option value="Administrador">Administradores</option>
                        <option value="Professor">Professores</option>
                        <option value="Aluno">Alunos</option>
                        <option value="Responsável">Responsáveis</option>
                    </select>
                </div>
                <div class="col-12 col-md-3 text-md-end">
                    <a href="/cadastro/index.html" class="btn btn-primary w-100" style="background-color: #3A6BFB; border: none; padding: 10px; border-radius: 10px;">
                        <i class="fas fa-user-plus me-2"></i>Novo Usuário
                    </a>
                </div>
            </div>
        </div>

        <div class="stat-card">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead class="table-light">
                        <tr class="tiny fw-bold text-muted">
                            <th>NOME COMPLETO</th>
                            <th>CARGO / TIPO</th>
                            <th>E-MAIL INSTITUCIONAL</th>
                            <th>ÚLTIMO ACESSO</th>
                            <th>STATUS</th>
                            <th class="text-center">AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-usuarios-completa">
                        </tbody>
                </table>
            </div>
        </div>

    </main>

    <script src="/shared/js/main.js"></script>
    <script src="script.js" type="module"></script>
</body>
</html>
