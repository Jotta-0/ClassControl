<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassControl | Gestão de Usuários</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="/shared/css/global.css">
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header mb-5">
            <img src="/assets/imagens/Logo.png" alt="Logo ClassControl" width="150">
        </div>
        <nav>
            <a href="../index.html" class="nav-link-custom"><i class="fas fa-home"></i> Início</a>
            <a href="#" class="nav-link-custom active"><i class="fas fa-users"></i> Usuários</a>
            <a href="../turmas/index.html" class="nav-link-custom"><i class="fas fa-graduation-cap"></i> Turmas</a>
            <a href="../mensagens/index.html" class="nav-link-custom"><i class="fas fa-comments"></i> Mensagens</a>
            <a href="../comunicados/index.html" class="nav-link-custom"><i class="fas fa-bullhorn"></i> Comunicados</a>
            <a href="../confuguracoes/index.html" class="nav-link-custom"><i class="fas fa-cog"></i> Configurações</a>
            
            <div class="logout-section mt-auto">
                <a href="#" class="nav-link-custom text-danger">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </a>
            </div>

        </nav>
    </aside>

    <main class="main-content">
        
        <header class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h3 class="fw-800 text-dark mb-1">Controle de Usuários</h3>
                <p class="text-muted small mb-0">Gerencie, filtre e adicione contas de acesso ao ecossistema escolar.</p>
            </div>
        </header>

        <div class="stat-card mb-4">
            <div class="row g-3 align-items-center">
                <div class="col-12 col-md-5">
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-search"></i></span>
                        <input type="text" id="input-busca" class="form-control bg-light border-start-0" placeholder="Buscar por nome, e-mail ou CPF...">
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <select id="filtro-cargo" class="form-select bg-light">
                        <option value="Todos">Todos os Cargos</option>
                        <option value="Administrador">Administradores</option>
                        <option value="Professor">Professores</option>
                        <option value="Aluno">Alunos</option>
                        <option value="Responsável">Responsáveis</option>
                    </select>
                </div>
                <div class="col-12 col-md-3 text-md-end">
                    <a href="../cadastro/index.html" class="btn btn-primary w-100" style="background-color: #3A6BFB; border: none; padding: 10px; border-radius: 10px;">
                        <i class="fas fa-user-plus me-2"></i>Novo Usuário
                    </a>
                </div>
            </div>
        </div>

        <div class="stat-card">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead class="table-light">
                        <tr class="tiny fw-bold text-muted">
                            <th>NOME COMPLETO</th>
                            <th>CARGO / TIPO</th>
                            <th>CPF</th>
                            <th>E-MAIL INSTITUCIONAL</th>
                            <th>ÚLTIMO ACESSO</th>
                            <th>STATUS</th>
                            <th class="text-center">AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-usuarios-completa">
                        </tbody>
                </table>
            </div>
        </div>

    </main>

    <div class="modal fade" id="modalEditarUsuario" tabindex="-1" aria-labelledby="modalEditarUsuarioLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
                <div class="modal-header border-0 pt-4 px-4">
                    <h5 class="fw-bold text-dark mb-0" id="modalEditarUsuarioLabel"><i class="fas fa-user-edit text-primary me-2"></i>Editar Usuário</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body px-4">
                    <form id="form-editar-usuario">
                        <input type="hidden" id="editar-index">
                        
                        <div class="mb-3">
                            <label for="editar-nome" class="form-label small fw-bold text-muted">Nome Completo</label>
                            <input type="text" class="form-control" id="editar-nome" required style="border-radius: 8px; padding: 10px;">
                        </div>
                        <div class="mb-3">
                            <label for="editar-email" class="form-label small fw-bold text-muted">E-mail Institucional</label>
                            <input type="email" class="form-control" id="editar-email" required style="border-radius: 8px; padding: 10px;">
                        </div>
                        <div class="mb-3">
                            <label for="editar-cpf" class="form-label small fw-bold text-muted">CPF do Usuário (Apenas números)</label>
                            <input type="text" class="form-control" id="editar-cpf" required style="border-radius: 8px; padding: 10px;">
                        </div>
                        <div class="mb-3">
                            <label for="editar-cargo" class="form-label small fw-bold text-muted">Cargo / Tipo</label>
                            <select class="form-select" id="editar-cargo" required style="border-radius: 8px; padding: 10px;">
                                <option value="Administrador">Administrador</option>
                                <option value="Professor">Professor</option>
                                <option value="Aluno">Aluno</option>
                                <option value="Responsável">Responsável</option>
                            </select>
                        </div>
                        
                        <div class="d-flex gap-2 justify-content-end my-3">
                            <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal" style="border-radius: 8px;">Cancelar</button>
                            <button type="submit" class="btn btn-primary px-4" style="background-color: #3A6BFB; border: none; border-radius: 8px;">Salvar Alterações</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/shared/js/main.js"></script>
    <script src="script.js"></script>
</body>
</html>
