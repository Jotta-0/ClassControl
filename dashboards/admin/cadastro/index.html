<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassControl | Cadastro de Usuário</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="/shared/css/global.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card-cadastro">
        <div class="text-center mb-4">
            <img id="logo" src="/assets/imagens/Logo.png" alt="Logo ClassControl" onerror="this.src='https://via.placeholder.com/150x40?text=ClassControl'">
            <h2 class="fw-800 text-dark mt-3 mb-1">Criar Conta</h2>
            <p class="subtitulo tiny fw-600">Preencha os campos abaixo para registrar um novo usuário no sistema.</p>
        </div>

        <form id="cadastroForm">
            <div class="mb-3">
                <label for="name" class="form-label-custom">Nome Completo</label>
                <input type="text" id="name" name="name" class="form-control-custom" placeholder="Digite o nome completo" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label-custom">E-mail Institucional</label>
                <input type="email" id="email" name="email" class="form-control-custom" placeholder="exemplo@classcontrol.com" required>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-12 col-sm-6">
                    <label for="cpf" class="form-label-custom">CPF</label>
                    <input type="text" id="cpf" name="cpf" class="form-control-custom" placeholder="000.000.000-00" required>
                </div>
                <div class="col-12 col-sm-6">
                    <label for="tipo" class="form-label-custom">Tipo de Usuário</label>
                    <select id="tipo" name="tipo" class="form-control-custom" required>
                        <option value="" disabled selected>Selecione...</option>
                        <option value="ADM">Administrador</option>
                        <option value="ALUNO">Aluno</option>
                        <option value="PROFESSOR">Professor</option>
                        <option value="RESPONSAVEL">Responsável</option>
                    </select>
                </div>
            </div>

            <div class="mb-4 hidden-password-wrapper">
                <label for="password" class="form-label-custom">Senha de Acesso</label>
                <input type="password" id="password" name="password" class="form-control-custom" placeholder="Defina uma senha segura" required>
            </div>

            <button type="submit" id="btnSubmit" class="btn-primary-custom mb-3">
                <i class="fas fa-user-plus me-2"></i> Finalizar Cadastro
            </button>

            <div class="text-center">
                <a href="../admin/index.html" class="link-retorno">
                    <i class="fas fa-arrow-left me-1"></i> Retornar para o início
                </a>
            </div>
        </form>
    </div>
    <!-- 1º: Carrega a biblioteca global do Supabase (Sempre primeiro!) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- 2º: Seus scripts utilitários e de inicialização -->
    <script src="/shared/js/main.js"></script>
    
    <!-- 3º: Seus scripts de regras de negócio e autenticação -->
    <script type="module" src="auth/auth.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
