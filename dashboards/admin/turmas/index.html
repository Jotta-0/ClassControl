<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassControl | Gestão de Turmas</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="/shared/css/global.css">
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header mb-5">
            <img src="/assets/imagens/Logo.png" alt="Logo ClassControl" width="150">
        </div>
        <nav>
            <a href="../index.html" class="nav-link-custom"><i class="fas fa-home"></i> Início</a>
            <a href="../usuarios/index.html" class="nav-link-custom"><i class="fas fa-users"></i> Usuários</a>
            <a href="#" class="nav-link-custom active"><i class="fas fa-graduation-cap"></i> Turmas</a>
            <a href="../mensagens/index.html" class="nav-link-custom"><i class="fas fa-comments"></i> Mensagens</a>
            <a href="../comunicados/index.html" class="nav-link-custom"><i class="fas fa-bullhorn"></i> Comunicados</a>
            <a href="../confuguracoes/index.html" class="nav-link-custom"><i class="fas fa-cog"></i> Configurações</a>
            
            <div class="logout-section mt-auto">
                <a href="#" class="nav-link-custom text-danger">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </a>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h3 class="fw-800 text-dark mb-1">Controle de Turmas</h3>
                <p class="text-muted small mb-0">Gerencie salas, turnos, atribuições de professores e cursos conectados ao banco de dados.</p>
            </div>
        </header>

        <div class="stat-card mb-4">
            <div class="row g-3 align-items-center">
                <div class="col-12 col-md-5">
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-search"></i></span>
                        <input type="text" id="input-busca-turma" class="form-control bg-light border-start-0" placeholder="Buscar por nome da turma...">
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <select id="filtro-turno" class="form-select bg-light">
                        <option value="Todos">Todos os Turnos</option>
                        <option value="Manhã">Manhã</option>
                        <option value="Tarde">Tarde</option>
                        <option value="Noite">Noite</option>
                    </select>
                </div>
                <div class="col-12 col-md-3 text-md-end">
                    <button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#modalNovaTurma" style="background-color: #3A6BFB; border: none; padding: 10px; border-radius: 10px; font-weight: 600;">
                        <i class="fas fa-plus me-2"></i>Nova Turma
                    </button>
                </div>
            </div>
        </div>

        <div class="stat-card">
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead class="table-light">
                        <tr class="tiny fw-bold text-muted">
                            <th>NOME DA TURMA</th>
                            <th>TURNO</th>
                            <th>PROFESSOR ATRIBUÍDO</th>
                            <th>CURSO</th>
                            <th class="text-center">AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-turmas-completa">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="modal fade" id="modalNovaTurma" tabindex="-1" aria-labelledby="modalNovaTurmaLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius: 15px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
                <div class="modal-header border-0 pt-4 px-4">
                    <h5 class="fw-bold text-dark mb-0" id="modalNovaTurmaLabel"><i class="fas fa-graduation-cap text-primary me-2"></i>Criar Nova Turma</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body px-4">
                    <form id="turmaForm">
                        <div class="mb-3">
                            <label for="nome_turma" class="form-label small fw-bold text-muted">Nome da Turma</label>
                            <input type="text" class="form-control" id="nome_turma" required style="border-radius: 8px; padding: 10px;" placeholder="Ex: Informática Avançada 2026">
                        </div>
                        
                        <div class="mb-3">
                            <label for="turno_turma" class="form-label small fw-bold text-muted">Turno</label>
                            <select id="turno_turma" class="form-select" style="border-radius: 8px; padding: 10px;">
                                <option value="Manhã">Manhã</option>
                                <option value="Tarde">Tarde</option>
                                <option value="Noite">Noite</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="professor" class="form-label small fw-bold text-muted">Professor Orientador</label>
                            <select id="professor" class="form-select" required style="border-radius: 8px; padding: 10px;">
                                </select>
                        </div>

                        <div class="mb-3">
                            <label for="curso" class="form-label small fw-bold text-muted">Curso Vinculado</label>
                            <select id="curso" class="form-select" required style="border-radius: 8px; padding: 10px;">
                                </select>
                        </div>
                        
                        <div class="d-flex gap-2 justify-content-end my-3">
                            <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal" style="border-radius: 8px;">Cancelar</button>
                            <button type="submit" class="btn btn-primary px-4" style="background-color: #3A6BFB; border: none; border-radius: 8px;">Criar Turma</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
