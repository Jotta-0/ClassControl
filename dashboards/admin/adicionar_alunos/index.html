<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Adicionar Alunos à Turma</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<link rel="stylesheet" href="../../../shared/css/global.css">

<link rel="stylesheet" href="../style.css">

</head>

<body>

<main class="main-content container py-4">

  <h3 class="fw-800 mb-3">Adicionar Alunos à Turma</h3>
  <p class="text-muted">Selecione a turma e os alunos que deseja vincular</p>

  <div class="stat-card p-4">

    <form id="formTurmaAlunos">

      <!-- ✅ TURMA -->
      <div class="mb-3">
        <label class="form-label">Turma</label>
        <select id="turma" class="form-select" required></select>
      </div>

      <!-- ✅ ALUNOS (MULTI SELECT) -->
      <div class="mb-3">
        <label class="form-label">Alunos</label>
        <select id="alunos" class="form-select" multiple size="10"></select>
      </div>

      <div class="text-end">
        <button type="submit" class="btn btn-success px-4">
          <i class="fas fa-user-plus me-2"></i>
          Adicionar Alunos
        </button>
      </div>

    </form>

  </div>

</main>

<script type="module" src="script.js"></script>

</body>
</html>
