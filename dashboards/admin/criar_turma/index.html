<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Criar Turma</title>
</head>
<body>

  <form id="turmaForm">

  Nome da Turma
  <input type="text" id="nome_turma" required>

  Turno
  <select id="turno_turma">
    <option value="Manhã">Manhã</option>
    <option value="Tarde">Tarde</option>
    <option value="Noite">Noite</option>
  </select>

  Professor
  <select id="professor"></select>

  Curso
  <select id="curso"></select>

  <button type="submit">Criar Turma</button>

</form>
  <div class="opcoes">
                <a href="../index.html">Retornar ao Dashboard</a>
            </div>

  <script type="module" src="script.js"></script>
</body>
</html>
