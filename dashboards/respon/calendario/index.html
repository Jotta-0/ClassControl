<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassControl</title>

    <!-- Fontes e Ícones Globais -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Sobe 3 níveis para achar a pasta 'shared' na raiz -->
    <link rel="stylesheet" href="../../../shared/css/global.css">
    <!-- Procura o style.css que está na mesma pasta que este arquivo -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- MENU DE NAVEGAÇÃO -->
    <aside class="sidebar">

        <button id="menu-toggle" class="menu-toggle-btn">
            <i class="fas fa-bars"></i>
        </button>

        <div class="sidebar-header mb-5">
            <img src="../../../assets/imagens/Logo.png" alt="Logo ClassControl" width="150">
        </div>
        <nav>
            <!-- Sobe 1 nível para voltar para a página principal do responsável -->
            <a href="../index.html" class="nav-link-custom"><i class="fas fa-home"></i> Início</a>
            <!-- Página atual ativa -->
             <a href="../notas/index.html" class="nav-link-custom"><i class="fas fa-book-open"></i> Desempenho</a>
            <a href="#" class="nav-link-custom active"><i class="fas fa-calendar-alt"></i> Calendário</a>
            <a href="../mensagens/index.html" class="nav-link-custom"><i class="fas fa-comment-dots"></i> Mensagens</a>
            <a href="../comunicados/index.html" class="nav-link-custom"><i class="fas fa-bullhorn"></i> Comunicados</a>
            <a href="../configuracoes/index.html" class="nav-link-custom"><i class="fas fa-cog"></i> Configurações</a>
            
            <div class="logout-section mt-auto">
                <a href="" class="nav-link-custom text-danger">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </a>
            </div>
        </nav>
    </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="main-content">
        
        <!-- HEADER DE IDENTIFICAÇÃO -->
        <header class="mb-4">
            <div class="user-card-mini d-flex justify-content-between align-items-center w-100">
                <div>
                    <h4 class="fw-800 mb-0">Calendário Acadêmico</h4>
                    <p class="text-muted small">Prazos, avaliações e eventos dos dependentes</p>
                </div>
                <div class="text-end">
                    <label class="tiny text-muted fw-bold d-block mb-1">VISUALIZANDO AGENDA DE:</label>
                    <select class="form-select form-select-sm border-0 bg-light fw-600" style="border-radius: 8px;">
                        <option>João Silva (Técnico em TI)</option>
                        <option>Maria Silva (Aprendizagem)</option>
                    </select>
                </div>
            </div>
        </header>

        <div class="row g-4">
            <!-- COLUNA DO CALENDÁRIO MENSAL -->
            <div class="col-lg-8">
                <div class="stat-card">
                    <!-- Controles do Mês -->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-800 mb-0" id="mes-ano-atual">Carregando Mês...</h5>
    
                        <div class="btn-group">
                            <button class="btn btn-outline-secondary btn-sm" id="btn-prev" disabled>
                                <i class="fas fa-chevron-left"></i>
                            </button>

                            <button class="btn btn-outline-secondary btn-sm fw-600 px-3" id="btn-today">
                                Ir para hoje
                            </button>

                            <button class="btn btn-outline-secondary btn-sm" id="btn-next" disabled>
                                <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Legendas -->
                    <div class="d-flex gap-3 flex-wrap mb-4 tiny fw-bold">
                        <div class="d-flex align-items-center gap-1"><span class="legenda-ponto bg-danger"></span> Avaliação / Entrega</div>
                        <div class="d-flex align-items-center gap-1"><span class="legenda-ponto bg-primary"></span> Evento / Reunião</div>
                        <div class="d-flex align-items-center gap-1"><span class="legenda-ponto bg-success"></span> Feriado / Recesso</div>
                    </div>

                    <!-- Estrutura do Calendário -->
                    <div class="calendar-grid">
                        <div class="calendar-day-header">Dom</div>
                        <div class="calendar-day-header">Seg</div>
                        <div class="calendar-day-header">Ter</div>
                        <div class="calendar-day-header">Qua</div>
                        <div class="calendar-day-header">Qui</div>
                        <div class="calendar-day-header">Sex</div>
                        <div class="calendar-day-header">Sáb</div>

                        <!-- Dias injetados via JS -->
                        <div id="calendar-days-container" class="d-contents"></div>
                    </div>
                </div>
            </div>

            <!-- COLUNA DE PRÓXIMOS COMPROMISSOS -->
            <div class="col-lg-4">
                <div class="stat-card h-100">
                    <h5 class="fw-bold mb-4"><i class="far fa-clock text-primary me-2"></i>Próximos Linha do Tempo</h5>
                    <div class="lista-eventos" id="lista-eventos-lateral">
                        <!-- Injetado via JS -->
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Procura o script.js que está na mesma pasta -->
     <script src="../../../shared/js/main.js"></script>
    <script src="script.js"></script>
</body>
</html>
