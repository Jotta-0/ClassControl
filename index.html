<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Portal Educacional</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/login.css">

  <script src="js/login.js" defer></script>
  
</head>
<body>

  <div class="container">
    <div class="card">

      <img src="assets/imagens/Logo.png" alt="Logo" id="logo">
      <h1>Portal Educacional</h1>
      <p class="subtitulo">Entre com suas credenciais</p>

      <label>CPF</label>
      <input type="number" placeholder="Digite seu CPF" minlength="11" maxlength="11">

      <label>Senha</label>
      <input type="password" placeholder="••••••••" minlength="8" maxlength="20">

      <div class="opcoes">
        <label>
        <input type="checkbox"> Lembrar-me
        </label>
        <a href="#">Esqueceu a senha?</a>
    </div>
        <button class="btn primary" data-destino="respon.html">Responsável</button>
        <button class="btn outline" data-destino="prof.html">Professor</button>
        <button class="btn outline-orange" data-destino="aluno.html">Aluno</button>
        <button class="btn orange" data-destino="admin.html">Administrador</button>
    </div>
  </div>

</body>
</html>
